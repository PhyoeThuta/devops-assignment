grafana:
  enabled: true
  adminPassword: "change-me"
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

prometheus:
  prometheusSpec:
    retention: 15d
    scrapeInterval: 30s
    evaluationInterval: 30s
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

additionalPrometheusRulesMap:
  general-rules:
    groups:
      - name: hello-api.rules
        rules:
          - alert: PodDown
            expr: up{job=~".*hello-api.*"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Hello API pod is down
              description: No scrape target available for 5 minutes
