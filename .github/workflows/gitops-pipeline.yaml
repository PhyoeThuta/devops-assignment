name: gitops-pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: echo "tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            phyoethuta/hello-api:${{ steps.tag.outputs.tag }}

      - name: Update Kustomize image tag
        run: |
          cd kustomize/overlays/prod
          kustomize edit set image hello-api=phyoethuta/hello-api:${{ steps.tag.outputs.tag }}

      - name: Commit manifest update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update image tag to ${{ steps.tag.outputs.tag }}"
          file_pattern: kustomize/overlays/prod/kustomization.yaml
